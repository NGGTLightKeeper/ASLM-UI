{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="{% block meta_description %}ASLM — Advanced System Language Models{% endblock %}" />
    <title>{% block title %}ASLM Chat{% endblock %}</title>

    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'favicon.ico' %}">

    <link rel="stylesheet" href="{% static 'css/main/base.css' %}" />
    <link rel="stylesheet" href="{% static 'css/main/main.css' %}" />
    <link rel="stylesheet" href="{% static 'css/main/markdown.css' %}" />
    {% block extra_css %}{% endblock %}
</head>

<body>
<div class="app-shell">

    <!-- Left Sidebar (shared across all pages) -->
    <aside class="sidebar sidebar-left">
        <div class="sidebar-header">
            <span class="logo-name">Chats</span>
        </div>

        <a class="new-chat-btn" id="newChatBtn" href="/">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M12 5v14M5 12h14"></path>
            </svg>
            <span>New Chat</span>
        </a>

        <div class="history-list" id="historyList">
            {% for chat in chats %}
                <div class="chat-item" data-chat-id="{{ chat.id }}">
                    <span class="chat-title">{{ chat.title }}</span>
                </div>
            {% empty %}
                <div class="chat-item empty-state">No previous chats</div>
            {% endfor %}
        </div>

        <div class="sidebar-footer">
            <a class="account-btn" href="/profile/">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
                </svg>
                <span>Account</span>
            </a>
        </div>
    </aside>

    <!-- Page content -->
    <div class="page-content">
        {% block body %}{% endblock %}
    </div>

</div>

<script src="{% static 'js/jquery.min.js' %}"></script>
<!-- Markdown parsing & sanitization -->
<script src="{% static 'js/vendor/marked.min.js' %}"></script>
<script src="{% static 'js/vendor/purify.min.js' %}"></script>
<!-- Highlight.js for code blocks -->
<link rel="stylesheet" href="{% static 'css/vendor/atom-one-dark.min.css' %}">
<script src="{% static 'js/vendor/highlight.min.js' %}"></script>

{% block extra_js %}{% endblock %}
</body>

</html>
